{% extends 'base.html' %}

{% block title %}Add Student — {{ app_name }}{% endblock %}

{% block content %}
<div class="page-header animate-in">
    <div>
        <h1 class="page-header__title">Add Student</h1>
        <p class="page-header__subtitle">Fill in the details to add a new student record.</p>
    </div>
    <div class="page-header__actions">
        <a href="{{ url_for('students.list_students') }}" class="btn btn--secondary">
            <i data-lucide="arrow-left"></i>
            Back to List
        </a>
    </div>
</div>

<div class="card card--no-hover animate-in" style="max-width: 720px;">
    <form method="POST" action="{{ url_for('students.add_student') }}" id="add-student-form" novalidate>

        <div class="form-row">
            <div class="form-group">
                <label for="roll_number" class="form-label">Roll Number *</label>
                <input
                    type="text"
                    id="roll_number"
                    name="roll_number"
                    class="form-input"
                    placeholder="e.g. CSE001"
                    required
                    value="{{ request.form.get('roll_number', '') }}"
                >
            </div>

            <div class="form-group">
                <label for="name" class="form-label">Full Name *</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    class="form-input"
                    placeholder="e.g. Rahul Sharma"
                    required
                    value="{{ request.form.get('name', '') }}"
                >
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="department" class="form-label">Department *</label>
                <select id="department" name="department" class="form-input form-select" required>
                    <option value="" disabled {% if not request.form.get('department') %}selected{% endif %}>
                        Select department
                    </option>
                    {% for dept in departments %}
                        <option value="{{ dept }}" {% if request.form.get('department') == dept %}selected{% endif %}>
                            {{ dept }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="year" class="form-label">Year *</label>
                <select id="year" name="year" class="form-input form-select" required>
                    <option value="" disabled {% if not request.form.get('year') %}selected{% endif %}>
                        Select year
                    </option>
                    {% for year in years %}
                        <option value="{{ year }}" {% if request.form.get('year')|string == year|string or (not request.form.get('year') and loop.first) %}selected{% endif %}>
                            {{ year }}{% if year == 1 %}st{% elif year == 2 %}nd{% elif year == 3 %}rd{% else %}th{% endif %} Year
                        </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">

            <div class="form-group">
                <label for="marks" class="form-label">Marks (0–100) *</label>
                <input
                    type="number"
                    id="marks"
                    name="marks"
                    class="form-input"
                    placeholder="e.g. 85"
                    min="0"
                    max="100"
                    required
                    value="{{ request.form.get('marks', '') }}"
                >
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-input"
                    placeholder="e.g. rahul@example.com"
                    value="{{ request.form.get('email', '') }}"
                >
            </div>

            <div class="form-group">
                <label for="phone" class="form-label">Phone</label>
                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    class="form-input"
                    placeholder="e.g. 9876543210"
                    value="{{ request.form.get('phone', '') }}"
                >
            </div>
        </div>

        <div class="flex gap-md mt-lg">
            <button type="submit" class="btn btn--primary btn--lg" id="btn-submit-student">
                <i data-lucide="plus"></i>
                Add Student
            </button>
            <a href="{{ url_for('students.list_students') }}" class="btn btn--secondary btn--lg">
                Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
