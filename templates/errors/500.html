{% extends 'base.html' %}

{% block title %}Server Error — {{ app_name }}{% endblock %}

{% block content %}
<div class="empty-state animate-in" style="margin-top: var(--space-3xl);">
    <div class="empty-state__icon" style="color: var(--danger); background-color: var(--danger-subtle);">
        <i data-lucide="server-crash"></i>
    </div>
    <h1 style="font-size: var(--fs-3xl); font-weight: var(--fw-extrabold); color: var(--text-primary); margin-bottom: var(--space-sm);">
        500
    </h1>
    <h3 class="empty-state__title">Internal Server Error</h3>
    <p class="empty-state__message">Oops! Something went wrong on our end. We're looking into it.</p>
    <a href="{{ url_for('main.dashboard') }}" class="btn btn--primary btn--lg" style="margin-top: var(--space-md);">
        <i data-lucide="rotate-ccw"></i>
        Try Again
    </a>
</div>
{% endblock %}
